<!DOCTYPE html>
<html>
<head>
<style>
    body {
    font-family: Arial, sans-serif;
    background-color: darkolivegreen;
    padding: 20px;
   }
   form {
    background-color: white;
    padding: 20px;
   }
   fieldset {
    border: 1px solid darkgray;
    border-radius: 5px;
    margin-bottom: 15px;
   }
   label {
    font-weight: bold;
   }

</style>


</head>
<body>

<form id="signupform" >
    <fieldset>
    <label>Student ID: <input type="number" id="sid" name="studentID" required></label><br>
    <label>Full Name: <input type="text" id="fname" name="full_name" required></label><br>
    <label>Birthday: <input type="date" id="bday" name="birthday" required></label><br>
    <label>Email Address: <input type="email" id="email" name="email" required></label><br>
    </fieldset>
    <fieldset>
    <label>Mobile Phone: <input type="text" id="phone" name="phone" required></label><br>
    <label for="Grade Level">Choose grade level:</label>
    <select name="Grade Level" id="Grade Level">
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
    </select></br>
    <input type="radio" id="intern" name="status" value="Intern">
    <label for="intern">Intern</label><br>
    <input type="radio" id="extern" name="status" value="Extern">
    <label for="extern">Extern</label><br>

    <label for="clubs">Choose a club:</label>
    <select name="clubs" id="clubs">
    <option value="football">Football</option>
    <option value="math">Math</option>
    <option value="science">Science</option>
    <option value="basketball">Basketball</option>
    <option value="arts">Arts</option>
    </select><br>
    </fieldset>

    <label for="reason">Reason for Joining:</label><br>
    <textarea id="reason" name="reason" rows="4" cols="50"></textarea>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">


    <p onclick="alert('So do you confirm this information?')">Before you submit... Click me!</p>
    
    </form>

    <script>
        const form = document.getElementById('signupform');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(form);
            const newEntry = Object.fromEntries(formData);

            let currentSignups = JSON.parse(localStorage.getItem('allSignups')) || [];
            currentSignups.push(newEntry);
            localStorage.setItem('allSignups', JSON.stringify(currentSignups));

            alert('Data saved to localStorage!');
            form.reset();
        });

    </script>

</body>    
</html>
